<!DOCTYPE html>
<html>
<head>
    <title>Supabase Isolated Test</title>
    <!-- ONLY load Supabase, nothing else -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Supabase Isolated Test</h1>
    <p>Open Console (F12) and click the button below.</p>
    <button id="testBtn">Click to Test Supabase</button>
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        // 1. PASTE YOUR REAL CREDENTIALS HERE
        const SUPABASE_URL = 'https://urmwdijpgarcxnzjcbmi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVybXdkaWpwZ2FyY3huempjYm1pIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDU4NjYwNywiZXhwIjoyMDk2MTYyNjA3fQ.t1cLr0Aak3YaubgZJ5H5SgEEV0i9YzcI3wKwXBBE5u4'; // ⚠️ MUST start with eyJ...

        // 2. We use a unique name (myTestClient) so it never conflicts with other scripts
        const myTestClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('testBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Sending... please wait.';
            resultDiv.style.color = 'blue';

            console.log('Attempting to insert...');
            
            const testData = {
                full_name: 'Test User',
                email: 'test@test.com',
                phone: '123456',
                subject: 'Test',
                message: 'This is a test.'
            };

            const { data, error } = await myTestClient
                .from('contact_submissions')
                .insert([testData])
                .select();

            if (error) {
                console.error('❌ SUPABASE ERROR:', error);
                resultDiv.textContent = 'FAILED! Check Console. Error: ' + error.message;
                resultDiv.style.color = 'red';
            } else {
                console.log('✅ SUCCESS! Data inserted:', data);
                resultDiv.textContent = 'SUCCESS! Check your Supabase Table Editor and refresh it!';
                resultDiv.style.color = 'green';
            }
        });
    </script>
</body>
</html>
